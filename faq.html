<html lang="da">
<head>

<title>FAQ — Portfolio Dashboard</title>

<link rel="icon" href="favicon.ico" />
<style>
  :root{
    --bg:#0b0e14; --surface:#131722; --surface-2:#1a1f2e; --border:#232838;
    --text:#e6e9f0; --dim:#8b93a7; --green:#26a69a; --red:#ef5350; --accent:#6c7dff;
    --accent-2:#9b7dff; --radius:16px;
    --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    background:var(--bg); color:var(--text); font-family:var(--font);
    line-height:1.55; -webkit-font-smoothing:antialiased; overflow-x:hidden;
  }
  a{color:inherit;text-decoration:none}
  .wrap{max-width:820px;margin:0 auto;padding:0 24px}
  .glow{position:fixed;inset:0;z-index:-1;pointer-events:none;
    background:
      radial-gradient(600px 400px at 15% -5%, rgba(108,125,255,.18), transparent 60%),
      radial-gradient(700px 500px at 90% 0%, rgba(155,125,255,.14), transparent 55%);
  }

  /* NAV */
  nav{position:sticky;top:0;z-index:50;backdrop-filter:blur(14px);
    background:rgba(11,14,20,.7);border-bottom:1px solid var(--border)}
  nav .wrap{max-width:1080px;display:flex;align-items:center;justify-content:space-between;height:64px}
  .brand{display:flex;align-items:center;gap:12px;font-weight:700;letter-spacing:-.01em;white-space:nowrap;font-size:16px}
  .brand img{width:32px;height:32px;border-radius:8px}
  .nav-right{display:flex;align-items:center;gap:12px}
  .nav-link{color:var(--dim);font-weight:600;font-size:14px;transition:color .15s ease;white-space:nowrap}
  .nav-link:hover{color:var(--text)}
  .lang{display:inline-flex;border:1px solid var(--border);border-radius:9px;overflow:hidden;background:var(--surface)}
  .lang button{appearance:none;-webkit-appearance:none;border:0;background:transparent;color:var(--dim);
    font:inherit;font-size:12px;font-weight:700;letter-spacing:.03em;padding:7px 11px;cursor:pointer;
    transition:color .15s ease,background .15s ease}
  .lang button[aria-pressed="true"]{background:var(--accent);color:#fff}
  .lang button:hover{color:var(--text)}
  .lang button[aria-pressed="true"]:hover{color:#fff}
  .nav-cta{background:var(--accent);color:#fff;padding:9px 18px;border-radius:10px;
    font-weight:600;font-size:14px;transition:transform .15s ease,background .15s ease}
  .nav-cta:hover{background:#5566ff;transform:translateY(-1px)}

  /* HEAD */
  header{padding:76px 0 22px;text-align:center}
  .eyebrow{color:var(--accent);font-weight:700;font-size:13px;letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px}
  h1{font-size:clamp(32px,5vw,52px);line-height:1.05;letter-spacing:-.03em;font-weight:800;margin-bottom:18px}
  .sub{font-size:clamp(16px,2.2vw,19px);color:var(--dim);max-width:560px;margin:0 auto}

  /* FAQ */
  #faq{padding:20px 0 70px}
  .faq-group-title{font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
    color:var(--accent-2);margin:34px 0 12px;padding-left:2px}
  .faq-group-title:first-child{margin-top:8px}
  details.qa{background:var(--surface);border:1px solid var(--border);border-radius:12px;
    margin-bottom:10px;overflow:hidden;transition:border-color .15s ease}
  details.qa[open]{border-color:#33405e}
  details.qa summary{list-style:none;cursor:pointer;padding:17px 20px;font-size:16px;font-weight:600;
    display:flex;align-items:center;gap:12px;user-select:none}
  details.qa summary::-webkit-details-marker{display:none}
  details.qa summary .chev{margin-left:auto;flex-shrink:0;color:var(--dim);transition:transform .2s ease}
  details.qa[open] summary .chev{transform:rotate(90deg)}
  details.qa summary:hover{color:#fff}
  .qa-body{padding:0 20px 20px;color:var(--text);font-size:15px}
  .qa-body p{margin:0 0 11px}
  .qa-body p:last-child{margin-bottom:0}
  .qa-body ol,.qa-body ul{margin:4px 0 13px;padding-left:22px;display:flex;flex-direction:column;gap:8px}
  .qa-body li{font-size:15px}
  .qa-body b{font-weight:700}
  .qa-body code{background:var(--surface-2);border:1px solid var(--border);border-radius:6px;
    padding:1px 6px;font-size:13px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
  .qa-body .tip{background:var(--surface-2);border:1px solid var(--border);border-left:3px solid var(--accent);
    border-radius:8px;padding:11px 14px;margin:0 0 13px;color:var(--dim);font-size:14px}
  .qa-body .tip b{color:var(--text)}
  .qa-body .steps li::marker{color:var(--accent);font-weight:700}
  .qa-body a{color:var(--accent);text-decoration:underline;text-underline-offset:2px}

  footer{border-top:1px solid var(--border);padding:34px 0;text-align:center;color:var(--dim);font-size:14px}
  footer a{color:var(--accent)}

  @media(max-width:700px){ .brand span.label{display:none} header{padding:52px 0 20px} .nav-right .nav-link.hide-sm{display:none} }
</style>
</head>

<nav>
  <div class="wrap">

    <div class="nav-right">
      <a class="nav-link hide-sm" href="release-notes.html" data-i18n="nav_notes">Nyheder</a>

        <button type="button" data-lang="da">DA</button>
        <button type="button" data-lang="en">EN</button>

      <a class="nav-cta" href="https://github.com/PortfolioLabAI/portfolio-dashboard-shared/releases/latest/download/Portfolio-Dashboard-autoupdate.dmg" data-i18n="nav_download">Download</a>

<header>

<script>
(function () {
  // Each FAQ: an optional group header (starts a new section) and a list of
  // {id, q:{da,en}, a:{da,en}} entries. The answer strings are trusted HTML
  // authored here (lists, <b>, <code>, .tip callouts) — rendered as innerHTML.
  var FAQS = [
    { group: { da: "Kom godt i gang", en: "Getting started" } },
    {
      id: "what",
      q: { da: "Hvad er Portfolio Dashboard?", en: "What is Portfolio Dashboard?" },
      a: {
        da: "<p>En hurtig, native Mac-app der samler hele din portefølje ét sted — aktier, ETF'er, fonde og udbytter, med live-kurser fra Yahoo Finance. Du kan have flere depoter (frie midler, pension, børneopsparing osv.), se udbytte-prognoser, og bruge FIRE-/Prognose-værktøjerne til at fremskrive din formue.</p>",
        en: "<p>A fast, native Mac app that gathers your whole portfolio in one place — stocks, ETFs, funds and dividends, with live prices from Yahoo Finance. You can keep several portfolios (free funds, pension, child savings, etc.), see dividend forecasts, and use the FIRE/Projection tools to project your wealth.</p>"
      }
    },
    {
      id: "free",
      q: { da: "Er det gratis?", en: "Is it free?" },
      a: {
        da: "<p>Ja. Appen er gratis og opdaterer sig selv. Hvis du får glæde af den, kan du frivilligt <a href=\"https://ko-fi.com/portfoliodashboard\" target=\"_blank\" rel=\"noopener noreferrer\">støtte udviklingen</a> — men der er ingen konto, abonnement eller betaling.</p>",
        en: "<p>Yes. The app is free and updates itself. If you find it useful you can optionally <a href=\"https://ko-fi.com/portfoliodashboard\" target=\"_blank\" rel=\"noopener noreferrer\">support development</a> — but there's no account, subscription or payment.</p>"
      }
    },
    {
      id: "macs",
      q: { da: "Hvilke Mac'er virker den på?", en: "Which Macs does it run on?" },
      a: {
        da: "<p>Alle nyere Mac'er. Appen er en universal version, der kører native på både Intel-Mac og Apple Silicon (M1/M2/M3/M4). Én download til begge — du behøver ikke vide hvilken chip din Mac har.</p>",
        en: "<p>All recent Macs. The app is a universal build that runs native on both Intel Macs and Apple Silicon (M1/M2/M3/M4). One download for both — you don't need to know which chip your Mac has.</p>"
      }
    },
    {
      id: "update",
      q: { da: "Hvordan opdaterer jeg appen?", en: "How do I update the app?" },
      a: {
        da: "<p>Det gør den selv. Appen tjekker for opdateringer ved opstart og hver 3. time, og henter nye versioner automatisk. Du får en lille dialog med hvad der er nyt — se også <a href=\"release-notes.html\">Nyheder</a>.</p>",
        en: "<p>It does that itself. The app checks for updates at launch and every 3 hours, and downloads new versions automatically. You get a small dialog with what's new — see also <a href=\"release-notes.html\">What's new</a>.</p>"
      }
    },

    { group: { da: "Få dine tal ind (import)", en: "Getting your data in (import)" } },
    {
      id: "import",
      q: { da: "Hvordan får jeg mine egne aktier ind? (import-guide)", en: "How do I add my own holdings? (import guide)" },
      a: {
        da: "<p>Du behøver ikke taste noget ind i hånden. Du henter én fil fra din bank og uploader den i appen — så bygger den antal, gennemsnitskurs (GAK) og kostbasis op automatisk. Det virker med <b>Nordnet</b>, <b>Nordea</b> og <b>Saxo Bank</b>.</p>" +
            "<p><b>Del 1 — Hent filen fra Nordnet, Saxo eller din bank (på computer, ikke mobil-app):</b></p>" +
            "<ol class=\"steps\">" +
            "<li>Log ind hos Nordnet/bank i en browser.</li>" +
            "<li><b>Nordnet:</b> åbn depotet → gå til <b>“Transaktioner og notaer”</b> → sæt datoen så <b>hele historikken</b> kommer med → klik <b>Eksporter CSV</b> (en <code>.csv</code>).<br><b>Nordea:</b> hent <b>“Transaktioner”</b>-eksporten (<code>.csv</code>).<br><b>Saxo Bank:</b> hent transaktions-eksporten som <code>.xlsx</code>.</li>" +
            "<li>Gem filen et sted du kan finde den igen (fx Overførsler).</li>" +
            "</ol>" +
            "<div class=\"tip\"><b>Vigtigt:</b> vælg den længste/tidligste datoperiode. Appen kan kun regne på det, der står i filen — mangler historikken, bliver antal og kostbasis for lave.</div>" +
            "<p><b>Del 2 — Importér i appen:</b></p>" +
            "<ol class=\"steps\">" +
            "<li>Vælg (eller opret) den <b>portefølje</b> filen hører til.</li>" +
            "<li>Gå til <b>Admin</b> (⚙️).</li>" +
            "<li>Under <b>“📥 Importér fra Nordnet, Nordea eller Saxo”</b> → klik <b>“Vælg fil”</b> → find din fil.</li>" +
            "<li>Appen læser filen, viser hvor mange aktier den genkendte, og opbygger antal, GAK og kostbasis ud fra hele købs-/salgshistorikken.</li>" +
            "</ol>" +
            "<div class=\"tip\">Filtypen genkendes automatisk — du skal ikke vælge bank. Har du flere depoter, henter du én fil pr. depot og importerer dem hver for sig.</div>" +
            "<p>Vil du også have dine <b>udbytter</b> med? Se næste spørgsmål.</p>",
        en: "<p>You don't have to type anything in by hand. You download one file from your bank and upload it in the app — it then builds up quantity, average cost (GAK) and cost basis automatically. It works with <b>Nordnet</b>, <b>Nordea</b> and <b>Saxo Bank</b>.</p>" +
            "<p><b>Part 1 — Get the file from Nordnet, Saxo or your bank (on a computer, not the phone app):</b></p>" +
            "<ol class=\"steps\">" +
            "<li>Log in to Nordnet/your bank in a browser.</li>" +
            "<li><b>Nordnet:</b> open the depot → go to <b>“Transactions and notes”</b> → set the date so the <b>full history</b> is included → click <b>Export CSV</b> (a <code>.csv</code>).<br><b>Nordea:</b> download the <b>“Transaktioner”</b> export (<code>.csv</code>).<br><b>Saxo Bank:</b> download the transaction export as <code>.xlsx</code>.</li>" +
            "<li>Save the file somewhere you can find it again (e.g. Downloads).</li>" +
            "</ol>" +
            "<div class=\"tip\"><b>Important:</b> choose the longest/earliest date range. The app can only calculate from what's in the file — if the history is missing, quantity and cost basis will be too low.</div>" +
            "<p><b>Part 2 — Import in the app:</b></p>" +
            "<ol class=\"steps\">" +
            "<li>Select (or create) the <b>portfolio</b> the file belongs to.</li>" +
            "<li>Go to <b>Admin</b> (⚙️).</li>" +
            "<li>Under <b>“📥 Import from Nordnet, Nordea or Saxo”</b> → click <b>“Choose file”</b> → pick your file.</li>" +
            "<li>The app reads the file, shows how many stocks it recognized, and builds quantity, average cost and cost basis from the full buy/sell history.</li>" +
            "</ol>" +
            "<div class=\"tip\">The file type is detected automatically — you don't pick the bank. If you have several depots, download one file per depot and import them separately.</div>" +
            "<p>Want your <b>dividends</b> too? See the next question.</p>"
      }
    },
    {
      id: "dividends",
      q: { da: "Hvordan importerer jeg min udbyttehistorik?", en: "How do I import my dividend history?" },
      a: {
        da: "<p>Den samme fil indeholder også dine udbytter:</p>" +
            "<ol class=\"steps\">" +
            "<li>Stadig på <b>Admin</b>-siden, find <b>“📥 Importér udbyttehistorik fra Nordnet, Nordea eller Saxo”</b>.</li>" +
            "<li>Klik <b>“Vælg fil”</b> og vælg <b>den samme fil igen</b>.</li>" +
            "<li>Nu vises de <b>præcise modtagne udbytter</b> pr. aktie og pr. år i stedet for estimater.</li>" +
            "</ol>" +
            "<div class=\"tip\">Udbytte-importen <b>erstatter</b> hele det importerede udbytteregnskab for porteføljen — så importér fra <b>én bank ad gangen</b> (Saxo lægges dog oven i et eksisterende Nordnet/Nordea-regnskab).</div>",
        en: "<p>The same file also contains your dividends:</p>" +
            "<ol class=\"steps\">" +
            "<li>Still on the <b>Admin</b> page, find <b>“📥 Import dividend history from Nordnet, Nordea or Saxo”</b>.</li>" +
            "<li>Click <b>“Choose file”</b> and pick <b>the same file again</b>.</li>" +
            "<li>You now get the <b>exact dividends received</b> per stock and per year instead of estimates.</li>" +
            "</ol>" +
            "<div class=\"tip\">The dividend import <b>replaces</b> the entire imported dividend record for that portfolio — so import from <b>one bank at a time</b> (Saxo, however, is added on top of an existing Nordnet/Nordea record).</div>"
      }
    },
    {
      id: "reimport",
      q: { da: "Kan jeg importere igen senere?", en: "Can I import again later?" },
      a: {
        da: "<p>Ja — hent bare en ny eksport når du vil opdatere, og importér oven i. Handler du kender fra før tælles ikke dobbelt (Nordnet-handler genkendes på bankens eget handels-id). Så kør gerne en frisk import med jævne mellemrum for at holde antal, kostbasis og udbytter opdaterede.</p>",
        en: "<p>Yes — just download a fresh export whenever you want to update, and import on top. Trades you already have won't be double-counted (Nordnet trades are matched on the bank's own trade id). So feel free to re-import periodically to keep quantities, cost basis and dividends up to date.</p>"
      }
    },
    {
      id: "unmatched",
      q: { da: "En aktie blev ikke genkendt — hvad gør jeg?", en: "A stock wasn't recognized — what do I do?" },
      a: {
        da: "<p>De fleste aktier, ETF'er og fonde genkendes automatisk. Bliver en enkelt vist som “ikke genkendt”, kan du tilføje den manuelt på <b>Admin</b>-siden: skriv dens <b>Yahoo-ticker</b> i Symbol-feltet (fx <code>AAPL</code> for Apple, <code>NOVO-B.CO</code> for Novo Nordisk B). Du finder tickeren ved at søge aktien på <a href=\"https://finance.yahoo.com\" target=\"_blank\" rel=\"noopener noreferrer\">finance.yahoo.com</a>.</p>",
        en: "<p>Most stocks, ETFs and funds are recognized automatically. If a single one shows as “not recognized”, you can add it manually on the <b>Admin</b> page: enter its <b>Yahoo ticker</b> in the Symbol field (e.g. <code>AAPL</code> for Apple, <code>NOVO-B.CO</code> for Novo Nordisk B). Find the ticker by searching the stock on <a href=\"https://finance.yahoo.com\" target=\"_blank\" rel=\"noopener noreferrer\">finance.yahoo.com</a>.</p>"
      }
    },

    { group: { da: "Privatliv & sikkerhed", en: "Privacy & security" } },
    {
      id: "privacy-data",
      q: { da: "Hvor ligger mine data — er de private?", en: "Where is my data — is it private?" },
      a: {
        da: "<p>Dine data bliver på din egen Mac. Beholdninger og importerede filer gemmes lokalt i en <b>krypteret database</b> — de sendes ikke til nogen server. Appen henter kun offentlige <b>kurser og valutakurser fra Yahoo Finance</b>, og sender en anonym “appen kører”-besked uden nogen af dine tal. Der er ingen konto og ingen login til en sky.</p>",
        en: "<p>Your data stays on your own Mac. Holdings and imported files are stored locally in an <b>encrypted database</b> — they're not sent to any server. The app only fetches public <b>prices and exchange rates from Yahoo Finance</b>, and sends an anonymous “app is running” heartbeat with none of your figures. There's no account and no cloud login.</p>"
      }
    },
    {
      id: "privacy-mode",
      q: { da: "Kan jeg skjule beløbene når andre kigger med?", en: "Can I hide the amounts when others are watching?" },
      a: {
        da: "<p>Ja. Klik på <b>øjet (👁)</b> i toppen for at slå privacy mode til — alle kronebeløb skjules som prikker, mens procenter stadig vises. Praktisk hvis du deler skærm eller sidder i et tog. Klik igen for at vise dem.</p>",
        en: "<p>Yes. Click the <b>eye (👁)</b> at the top to toggle privacy mode — all kroner amounts are hidden as dots while percentages stay visible. Handy when sharing your screen or on a train. Click again to reveal them.</p>"
      }
    }
  ];

  var STR = {
    da: {
      title: "FAQ — Portfolio Dashboard",
      meta: "Ofte stillede spørgsmål om Portfolio Dashboard — bl.a. hvordan du henter dine tal fra Nordnet, Nordea eller Saxo og importerer dem i appen.",
      nav_download: "Download",
      nav_notes: "Nyheder",
      eyebrow: "Hjælp",
      h1: "Ofte stillede spørgsmål",
      sub: "Kom hurtigt i gang — og få dine egne tal fra Nordnet, Nordea eller Saxo ind i appen.",
      footer: "Portfolio Dashboard · privat app · data hentes fra Yahoo Finance",
      footer_home: "Til forsiden",
      footer_notes: "Nyheder",
      footer_support: "Støt udviklingen"
    },
    en: {
      title: "FAQ — Portfolio Dashboard",
      meta: "Frequently asked questions about Portfolio Dashboard — including how to export your data from Nordnet, Nordea or Saxo and import it into the app.",
      nav_download: "Download",
      nav_notes: "What's new",
      eyebrow: "Help",
      h1: "Frequently asked questions",
      sub: "Get started quickly — and bring your own numbers from Nordnet, Nordea or Saxo into the app.",
      footer: "Portfolio Dashboard · private app · data from Yahoo Finance",
      footer_home: "Home",
      footer_notes: "What's new",
      footer_support: "Support development"
    }
  };

  var CHEV = '<svg class="chev" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 6l6 6-6 6"/></svg>';

  function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

  function renderFaq(lang) {
    var hash = (location.hash || "").replace("#", "");
    var html = "";
    for (var i = 0; i < FAQS.length; i++) {
      var f = FAQS[i];
      if (f.group) {
        html += '<div class="faq-group-title">' + esc((f.group[lang] || f.group.en)) + "</div>";
        continue;
      }
      var q = f.q[lang] || f.q.en;
      var a = f.a[lang] || f.a.en;
      var open = (hash && hash === f.id) ? " open" : "";
      html += '<details class="qa" id="' + f.id + '"' + open + '>' +
        '<summary>' + esc(q) + CHEV + '</summary>' +
        '<div class="qa-body">' + a + '</div></details>';
    }
    document.getElementById("faq").innerHTML = html;

    // If linked directly to a question (faq.html#import), scroll it into view.
    if (hash) {
      var el = document.getElementById(hash);
      if (el) setTimeout(function () { el.scrollIntoView({ block: "start" }); }, 60);
    }
  }

  function apply(lang) {
    var dict = STR[lang] || STR.en;
    document.documentElement.lang = lang;
    document.title = dict.title;
    var md = document.querySelector('meta[name="description"]');
    if (md) md.setAttribute("content", dict.meta);
    var nodes = document.querySelectorAll("[data-i18n]");
    for (var i = 0; i < nodes.length; i++) {
      var k = nodes[i].getAttribute("data-i18n");
      if (dict[k] != null) nodes[i].innerHTML = dict[k];
    }
    var btns = document.querySelectorAll("[data-lang]");
    for (var j = 0; j < btns.length; j++) {
      btns[j].setAttribute("aria-pressed", btns[j].getAttribute("data-lang") === lang ? "true" : "false");
    }
    renderFaq(lang);
  }

  function saved() { try { return localStorage.getItem("pd_lang"); } catch (e) { return null; } }
  function save(l) { try { localStorage.setItem("pd_lang", l); } catch (e) {} }

  var manual = saved();
  apply(manual || ((navigator.language || "").toLowerCase().indexOf("da") === 0 ? "da" : "en"));

  if (!manual) {
    // Same country rule as the landing page: Danish only for Denmark.
    fetch("/api/geo")
      .then(function (r) { return r.json(); })
      .then(function (d) { if (!saved()) apply(d && d.country === "DK" ? "da" : "en"); })
      .catch(function () {});
  }

  document.addEventListener("click", function (e) {
    var b = e.target.closest ? e.target.closest("[data-lang]") : null;
    if (!b) return;
    save(b.getAttribute("data-lang"));
    apply(b.getAttribute("data-lang"));
  });
})();
</script>
